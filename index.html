<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->
  <meta name="author" content="Furkan Ongoren">
  <meta name="description" content="A responsive stats preview card using HTML and CSS flexbox">
  <title>Furkan Ongoren | Stats Preview Card</title>
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=Lexend+Deca&display=swap" rel="stylesheet"> 
  <link rel="stylesheet" href="index.css">

</head>
<body>
  <main class="wrapper">
    <header class="header-hero">
      <div class="header-filter"></div>
    </header>

    <article class="company-info">
      <h1>Get <span class="accent">insights</span> that help your business grow.</h1>
      <p>Discover the benefits of data analytics and make better decisions regarding revenue, customer 
        experience, and overall efficiency.</p>
      <div class="stat-wrap">
        <h2>10k+ <span class="stat">companies</span></h2>
        <h2>314 <span class="stat">templates</span></h2>
        <h2>12m+ <span class="stat">queries</span></h2>
      </div>
    </article>
  </main>
</body>
</html>
